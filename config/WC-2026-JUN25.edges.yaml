# Independent edge analysis for the June 25 World Cup potential-play watchlist.
#
# Fair probabilities are derived from external sportsbook prices, not the Kalshi
# contract being evaluated. No candidate is approved for execution in this file.

edge_analysis:
  id: WC-2026-JUN25-EDGE-ANALYSIS
  slate_id: WC-2026-JUN25
