    later_matches: pending
  lineup_updates:
    - "Germany retained Neuer, Kimmich, Pavlovic, Nmecha, Sane, Musiala, Wirtz, and Havertz; the expected heavy rotation did not occur."
    - "Ivory Coast starts Diallo, Pepe, Bonny, and Yan Diomande in a strong attacking XI."
  methodology:
    - "De-vig both sides of a two-way market or all outcomes of a three-way moneyline."
    - "For Ivory Coast's team total, fit independent Poisson scoring rates to de-vigged DraftKings match-result and total prices."
    - "Use the midpoint only when two independent sportsbook snapshots define a fair-probability range."
    - "A one-sided sportsbook quote is an upper bound on fair probability, not a verified fair price."
    - "Gross edge equals external fair probability minus the current Kalshi ask."
    - "Estimated taker-fee load uses Kalshi's general formula before per-order rounding: 0.07 * P * (1-P)."
    - "Fee-adjusted edge equals gross edge minus estimated taker-fee load."
    - "The normal gate requires at least 0.05 gross edge before execution risk checks."

